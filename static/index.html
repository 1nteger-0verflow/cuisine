<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フランス料理辞典</title>
  <style>
    :root {
      --primary: #7a5c1e;
      --primary-light: #f3e8cc;
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e5df;
      --text: #1c1a17;
      --muted: #6b6560;
      --danger: #c0392b;
      --nav-h: 58px;
      --hdr-h: 54px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 680px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── Header ── */
    .hdr {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      height: var(--hdr-h);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      z-index: 100;
    }
    .hdr-title { font-size: 16px; font-weight: 700; white-space: nowrap; color: var(--primary); }
    .search {
      flex: 1; height: 34px;
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0 10px; font-size: 14px; background: var(--bg); outline: none; color: var(--text);
    }
    .search:focus { border-color: var(--primary); }

    /* ── Bottom nav ── */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px; height: var(--nav-h);
      background: var(--surface); border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 10px; font-family: inherit;
      padding: 6px 0;
    }
    .nav-btn.on { color: var(--primary); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── Main ── */
    .main {
      margin-top: var(--hdr-h);
      padding-bottom: calc(var(--nav-h) + 72px);
    }

    /* ── Filter chips ── */
    .chips {
      display: flex; gap: 7px; padding: 10px 14px;
      overflow-x: auto; scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; padding: 5px 13px; border-radius: 20px;
      font-size: 12px; border: 1px solid var(--border);
      background: var(--surface); cursor: pointer; color: var(--muted);
      font-family: inherit;
    }
    .chip.on { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── Cards ── */
    .list { padding: 0 14px; display: flex; flex-direction: column; gap: 7px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
    }
    .card:active { background: var(--primary-light); }
    .card-body { flex: 1; min-width: 0; }
    .card-fr { font-size: 15px; font-weight: 600; }
    .card-ja { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--primary-light); color: var(--primary); white-space: nowrap; flex-shrink: 0;
    }
    .badge.easy   { background: #d5f0da; color: #1a6b30; }
    .badge.medium { background: #fef3cd; color: #856404; }
    .badge.hard   { background: #fde8e8; color: #b02a2a; }
    .arr { color: var(--border); flex-shrink: 0; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(var(--nav-h) + 14px); right: 16px;
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--primary); color: #fff; border: none;
      font-size: 26px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(122,92,30,.35); z-index: 99;
    }

    /* ── Detail view ── */
    .detail {
      display: none; position: fixed; inset: 0;
      left: 50%; transform: translateX(-50%); width: 100%; max-width: 680px;
      background: var(--bg); z-index: 200; overflow-y: auto;
    }
    .detail.on { display: block; }
    .detail-hdr {
      position: sticky; top: 0; background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: var(--hdr-h); padding: 0 14px;
      display: flex; align-items: center; gap: 10px; z-index: 10;
    }
    .back {
      background: none; border: none; cursor: pointer;
      color: var(--primary); font-size: 14px; font-family: inherit;
      display: flex; align-items: center; gap: 4px; padding: 8px 0;
    }
    .detail-actions { margin-left: auto; display: flex; gap: 4px; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--primary); font-size: 14px; font-family: inherit;
      padding: 8px 10px; border-radius: 8px;
    }
    .icon-btn:hover { background: var(--primary-light); }
    .icon-btn.del { color: var(--danger); }
    .icon-btn.del:hover { background: #fde8e8; }
    .detail-body { padding: 18px 16px; }
    .d-fr { font-size: 26px; font-weight: 700; line-height: 1.2; }
    .d-ja { font-size: 17px; color: var(--muted); margin-top: 4px; }
    .d-read { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .sec { margin-top: 20px; }
    .sec-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px;
    }
    .sec-text { font-size: 14px; line-height: 1.7; }

    /* Related terms */
    .rel-list { display: flex; flex-direction: column; gap: 7px; }
    .rel-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .rel-info { flex: 1; min-width: 0; }
    .rel-fr { font-size: 14px; font-weight: 500; }
    .rel-ja { font-size: 12px; color: var(--muted); }
    .rel-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .rel-cat {
      font-size: 10px; padding: 1px 6px; border-radius: 6px;
      background: var(--border); color: var(--muted);
    }
    .rel-type { font-size: 11px; color: var(--muted); }
    .del-rel {
      background: none; border: none; cursor: pointer;
      color: var(--danger); font-size: 18px; padding: 2px 4px; flex-shrink: 0;
      line-height: 1;
    }

    /* Add relation form */
    .add-rel { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }
    .add-rel-row { display: flex; gap: 7px; }
    .add-rel select, .add-rel input[type=text] { flex: 1; }
    .add-rel-btn {
      padding: 9px 16px; background: var(--primary); color: #fff;
      border: none; border-radius: 9px; cursor: pointer;
      font-size: 13px; font-family: inherit; white-space: nowrap;
    }

    /* Recipe */
    .ing-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .ing-item:last-child { border-bottom: none; }
    .ing-fr { font-size: 14px; font-weight: 500; }
    .ing-ja { font-size: 12px; color: var(--muted); }
    .ing-qty { font-size: 13px; color: var(--muted); flex-shrink: 0; margin-left: 8px; }
    .step-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .step-item:last-child { border-bottom: none; }
    .step-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .step-ja { font-size: 14px; }
    .step-fr { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; }

    /* Modal */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 300;
    }
    .overlay.on { display: block; }
    .sheet {
      position: absolute; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 680px;
      background: var(--surface); border-radius: 16px 16px 0 0;
      padding: 20px 16px 40px; max-height: 90vh; overflow-y: auto;
    }
    .sheet-title {
      font-size: 16px; font-weight: 700; margin-bottom: 16px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .fg { margin-bottom: 13px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    input[type=text], select, textarea {
      width: 100%; padding: 9px 11px;
      border: 1px solid var(--border); border-radius: 9px;
      font-size: 14px; background: var(--bg); outline: none;
      color: var(--text); font-family: inherit;
    }
    input[type=text]:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 70px; }
    .btn { width: 100%; padding: 13px; border-radius: 11px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
    .btn-p { background: var(--primary); color: #fff; margin-top: 4px; }
    .btn-s { background: var(--border); color: var(--text); margin-top: 8px; }

    /* Empty / loading */
    .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
    .empty svg { width: 44px; height: 44px; margin-bottom: 10px; opacity: .3; }
  </style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title" id="hdrTitle">料理</span>
  <input class="search" id="searchInput" type="search" placeholder="検索…" autocomplete="off">
</div>

<div class="main" id="mainContent">
  <div class="empty">読み込み中…</div>
</div>

<button class="fab" id="fabBtn">+</button>

<nav class="nav">
  <button class="nav-btn on" data-tab="dishes" onclick="switchTab('dishes',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12h20M12 2C8 6 8 10 8 12s0 6 4 10M12 2c4 4 4 8 4 10s0 6-4 10"/></svg>
    料理
  </button>
  <button class="nav-btn" data-tab="ingredients" onclick="switchTab('ingredients',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2a5 5 0 0 0-5 5c0 2.5 1.5 4.5 5 5v10"/><path d="M17 7c0-2.76-2.24-5-5-5"/></svg>
    食材
  </button>
  <button class="nav-btn" data-tab="utensils" onclick="switchTab('utensils',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 2v8l-2 4h14l-2-4V2M5 14v8M19 14v8M12 2v12"/></svg>
    器具
  </button>
  <button class="nav-btn" data-tab="techniques" onclick="switchTab('techniques',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
    技法
  </button>
  <button class="nav-btn" data-tab="recipes" onclick="switchTab('recipes',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 10h16M4 14h10M4 18h7"/></svg>
    レシピ
  </button>
</nav>

<!-- Detail overlay -->
<div class="detail" id="detailView">
  <div class="detail-hdr">
    <button class="back" onclick="closeDetail()">
      <svg width="7" height="12" viewBox="0 0 7 12"><path d="M6 1L1 6L6 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      戻る
    </button>
    <div class="detail-actions">
      <button class="icon-btn" id="editBtn" onclick="openEditModal()">編集</button>
      <button class="icon-btn del" id="delBtn" onclick="deleteItem()">削除</button>
    </div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="sheetTitle">新規追加</div>
    <div id="sheetBody"></div>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────
let tab   = 'dishes';
let items = [];
let item  = null;   // current detail
let q     = '';
let genre = null;
let isEdit = false;

// ── Config ─────────────────────────────────────────────
const TABS = {
  dishes: {
    label: '料理', ep: '/dishes', genreKey: 'genre',
    genres: ['soup','stew','dessert','pastry','main','appetizer'],
    gl: {soup:'スープ', stew:'シチュー', dessert:'デザート', pastry:'パティスリー', main:'メイン', appetizer:'前菜'},
  },
  ingredients: {
    label: '食材', ep: '/ingredients', genreKey: 'genre',
    genres: ['dairy','herb','spice','vegetable','mushroom','protein','grain','seafood'],
    gl: {dairy:'乳製品', herb:'ハーブ', spice:'スパイス', vegetable:'野菜', mushroom:'きのこ', protein:'タンパク質', grain:'穀物', seafood:'魚介'},
  },
  utensils:   { label: '調理器具', ep: '/utensils',   genres: [], gl: {} },
  techniques: { label: 'テクニック', ep: '/techniques', genres: [], gl: {} },
  recipes: {
    label: 'レシピ', ep: '/recipes', genreKey: 'difficulty',
    genres: ['easy','medium','hard'],
    gl: {easy:'簡単', medium:'普通', hard:'難しい'},
    isRecipe: true,
  },
};

const CAT_EP = { dish:'/dishes', ingredient:'/ingredients', utensil:'/utensils', technique:'/techniques' };
const CAT_LBL = { dish:'料理', ingredient:'食材', utensil:'器具', technique:'テクニック' };

// ── API ────────────────────────────────────────────────
async function api(method, path, body) {
  const opt = { method, headers: {} };
  if (body) { opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
  const r = await fetch(path, opt);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  if (r.status === 204) return null;
  return r.json();
}

// ── Tab switch ─────────────────────────────────────────
async function switchTab(t, el) {
  tab = t; q = ''; genre = null;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('hdrTitle').textContent = TABS[t].label;
  await load();
}

// ── Load list ──────────────────────────────────────────
async function load() {
  const c = TABS[tab];
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="empty">読み込み中…</div>';
  try {
    const ps = new URLSearchParams();
    if (q) ps.set('q', q);
    if (genre && c.genreKey && !c.isRecipe) ps.set(c.genreKey, genre);
    const qs = ps.toString();
    items = await api('GET', c.ep + (qs ? '?' + qs : ''));
    // Client-side difficulty filter for recipes
    if (c.isRecipe && genre) items = items.filter(i => i.difficulty === genre);
    render();
  } catch(e) {
    main.innerHTML = `<div class="empty">エラー: ${h(e.message)}</div>`;
  }
}

// ── Render list ────────────────────────────────────────
function render() {
  const c = TABS[tab];
  let html = '';

  if (c.genres.length) {
    html += '<div class="chips">';
    html += `<button class="chip ${!genre?'on':''}" onclick="setGenre(null)">すべて</button>`;
    c.genres.forEach(g => {
      html += `<button class="chip ${genre===g?'on':''}" onclick="setGenre('${g}')">${c.gl[g]||g}</button>`;
    });
    html += '</div>';
  }

  html += '<div class="list">';
  if (!items.length) {
    html += '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg><p>見つかりません</p></div>';
  } else {
    items.forEach((it, i) => {
      const fr = it.name_french || it.french;
      const ja = it.description_japanese || it.japanese || '';
      let bdg = '';
      if (it.difficulty) {
        bdg = `<span class="badge ${it.difficulty}">${c.gl[it.difficulty]||it.difficulty}</span>`;
      } else if (it.genre) {
        bdg = `<span class="badge">${c.gl[it.genre]||it.genre}</span>`;
      }
      html += `<div class="card" onclick="openDetail(${i})">
        <div class="card-body">
          <div class="card-fr">${h(fr)}</div>
          <div class="card-ja">${h(ja)}</div>
        </div>
        ${bdg}
        <svg class="arr" width="7" height="12" viewBox="0 0 7 12"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>`;
    });
  }
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ── Detail ─────────────────────────────────────────────
async function openDetail(idx) {
  const c = TABS[tab];
  try {
    item = await api('GET', `${c.ep}/${items[idx].id}`);
    renderDetail();
    document.getElementById('detailView').classList.add('on');
  } catch(e) { alert('エラー: ' + e.message); }
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('on');
  item = null;
}

function itemId() { return item?.id; }

function renderDetail() {
  const c = TABS[tab];
  let html = '';

  if (c.isRecipe) {
    html += `<div class="d-fr">${h(item.name_french)}</div>`;
    if (item.description_japanese) html += `<div class="d-ja">${h(item.description_japanese)}</div>`;
    if (item.difficulty) {
      html += `<div class="sec"><div class="sec-title">難易度</div>
        <span class="badge ${item.difficulty}" style="font-size:13px;padding:4px 12px">${c.gl[item.difficulty]||item.difficulty}</span></div>`;
    }
    // Ingredients
    if (item.ingredients?.length) {
      html += '<div class="sec"><div class="sec-title">食材</div>';
      item.ingredients.forEach(ing => {
        html += `<div class="ing-item">
          <div><div class="ing-fr">${h(ing.french)}</div><div class="ing-ja">${h(ing.japanese)}</div></div>
          <div class="ing-qty">${h(ing.quantity||'')}</div>
        </div>`;
      });
      html += '</div>';
    }
    // Steps
    if (item.steps?.length) {
      html += '<div class="sec"><div class="sec-title">手順</div>';
      item.steps.forEach(s => {
        html += `<div class="step-item">
          <div class="step-num">${s.step_number}</div>
          <div>
            ${s.instruction_japanese?`<div class="step-ja">${h(s.instruction_japanese)}</div>`:''}
            ${s.instruction_french?`<div class="step-fr">${h(s.instruction_french)}</div>`:''}
          </div>
        </div>`;
      });
      html += '</div>';
    }
  } else {
    html += `<div class="d-fr">${h(item.french)}</div>`;
    if (item.japanese) html += `<div class="d-ja">${h(item.japanese)}</div>`;
    if (item.reading)  html += `<div class="d-read">${h(item.reading)}</div>`;
    if (item.genre && c.gl[item.genre]) {
      html += `<div class="sec"><div class="sec-title">カテゴリー</div>
        <span class="badge" style="font-size:13px;padding:4px 12px">${c.gl[item.genre]}</span></div>`;
    }
    if (item.notes) {
      html += `<div class="sec"><div class="sec-title">メモ</div><div class="sec-text">${h(item.notes)}</div></div>`;
    }
    // Related terms
    html += `<div class="sec"><div class="sec-title">関連用語</div>
      <div class="rel-list" id="relList">`;
    (item.related_terms||[]).forEach(r => {
      html += `<div class="rel-item">
        <div class="rel-info"><div class="rel-fr">${h(r.french)}</div><div class="rel-ja">${h(r.japanese)}</div></div>
        <div class="rel-meta">
          <span class="rel-cat">${CAT_LBL[r.category]||r.category}</span>
          ${r.relation_type?`<span class="rel-type">${h(r.relation_type)}</span>`:''}
        </div>
        <button class="del-rel" onclick="delRelation('${r.category}',${r.id})">×</button>
      </div>`;
    });
    if (!(item.related_terms||[]).length) html += '<div style="color:var(--muted);font-size:13px">関連用語なし</div>';
    html += `</div>
      <div class="add-rel">
        <div class="add-rel-row">
          <select id="relCat" onchange="loadRelCandidates()">
            <option value="dish">料理</option>
            <option value="ingredient">食材</option>
            <option value="utensil">器具</option>
            <option value="technique">テクニック</option>
          </select>
          <select id="relItem"><option>読込中…</option></select>
        </div>
        <div class="add-rel-row">
          <input type="text" id="relType" placeholder="関係の種類（任意）">
          <button class="add-rel-btn" onclick="addRelation()">追加</button>
        </div>
      </div>
    </div>`;

    // Kick off loading candidates
    setTimeout(loadRelCandidates, 0);
  }

  document.getElementById('detailBody').innerHTML = html;
}

// ── Relations ──────────────────────────────────────────
async function loadRelCandidates() {
  const cat = document.getElementById('relCat')?.value;
  if (!cat) return;
  const sel = document.getElementById('relItem');
  if (!sel) return;
  sel.innerHTML = '<option>読込中…</option>';
  try {
    const list = await api('GET', CAT_EP[cat]);
    sel.innerHTML = list.map(i => `<option value="${i.id}">${i.french}（${i.japanese||''}）</option>`).join('');
  } catch(e) {
    sel.innerHTML = '<option>エラー</option>';
  }
}

async function addRelation() {
  const toCat = document.getElementById('relCat').value;
  const toId  = parseInt(document.getElementById('relItem').value);
  const rtype = document.getElementById('relType').value.trim() || null;
  if (!toId) return;
  const c = TABS[tab];
  try {
    await api('POST', `${c.ep}/${itemId()}/relations`, { to_category: toCat, to_id: toId, relation_type: rtype });
    item = await api('GET', `${c.ep}/${itemId()}`);
    renderDetail();
  } catch(e) { alert('エラー: ' + e.message); }
}

async function delRelation(toCat, toId) {
  if (!confirm('この関連用語を削除しますか？')) return;
  const c = TABS[tab];
  try {
    await api('DELETE', `${c.ep}/${itemId()}/relations/${toCat}/${toId}`);
    item = await api('GET', `${c.ep}/${itemId()}`);
    renderDetail();
  } catch(e) { alert('エラー: ' + e.message); }
}

// ── CRUD ───────────────────────────────────────────────
document.getElementById('fabBtn').onclick = openCreateModal;

function openCreateModal() {
  isEdit = false;
  document.getElementById('sheetTitle').textContent = '新規追加';
  document.getElementById('sheetBody').innerHTML = buildForm(null);
  document.getElementById('overlay').classList.add('on');
}

function openEditModal() {
  isEdit = true;
  document.getElementById('sheetTitle').textContent = '編集';
  document.getElementById('sheetBody').innerHTML = buildForm(item);
  document.getElementById('overlay').classList.add('on');
}

function closeModal() { document.getElementById('overlay').classList.remove('on'); }

function buildForm(data) {
  const c = TABS[tab];
  data = data || {};
  let html = '';

  if (c.isRecipe) {
    html += fg('フランス語名 *', 'name_french', data.name_french);
    html += fg('説明（日本語）', 'description_japanese', data.description_japanese, 'textarea');
    html += fgSelect('難易度', 'difficulty', data.difficulty, [
      {v:'',l:'未設定'},{v:'easy',l:'簡単'},{v:'medium',l:'普通'},{v:'hard',l:'難しい'}
    ]);
  } else {
    html += fg('フランス語 *', 'french', data.french);
    html += fg('日本語 *', 'japanese', data.japanese);
    html += fg('読み方', 'reading', data.reading);
    if (c.genres.length) {
      html += fgSelect('カテゴリー', 'genre', data.genre,
        [{v:'',l:'未設定'}, ...c.genres.map(g => ({v:g,l:c.gl[g]||g}))]);
    }
    html += fg('メモ', 'notes', data.notes, 'textarea');
  }

  html += `<button class="btn btn-p" onclick="submitForm()">${isEdit?'更新':'追加'}</button>`;
  html += `<button class="btn btn-s" onclick="closeModal()">キャンセル</button>`;
  return html;
}

function fg(label, name, val, type) {
  const v = val ? h(val) : '';
  if (type === 'textarea') {
    return `<div class="fg"><label>${label}</label><textarea name="${name}">${v}</textarea></div>`;
  }
  return `<div class="fg"><label>${label}</label><input type="text" name="${name}" value="${v}"></div>`;
}

function fgSelect(label, name, val, opts) {
  const os = opts.map(o => `<option value="${o.v}"${val===o.v?' selected':''}>${o.l}</option>`).join('');
  return `<div class="fg"><label>${label}</label><select name="${name}">${os}</select></div>`;
}

async function submitForm() {
  const c = TABS[tab];
  const sheet = document.querySelector('.sheet');
  const body = {};
  sheet.querySelectorAll('[name]').forEach(el => { body[el.name] = el.value || null; });

  try {
    if (isEdit) {
      const id = itemId();
      await api('PUT', `${c.ep}/${id}`, body);
      closeModal();
      item = await api('GET', `${c.ep}/${id}`);
      renderDetail();
      await load();
    } else {
      await api('POST', c.ep, body);
      closeModal();
      await load();
    }
  } catch(e) { alert('エラー: ' + e.message); }
}

async function deleteItem() {
  if (!confirm('削除しますか？')) return;
  const c = TABS[tab];
  try {
    await api('DELETE', `${c.ep}/${itemId()}`);
    closeDetail();
    await load();
  } catch(e) { alert('エラー: ' + e.message); }
}

// ── Search ─────────────────────────────────────────────
let st;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(st);
  q = e.target.value;
  st = setTimeout(load, 280);
});

// ── Genre filter ───────────────────────────────────────
function setGenre(g) { genre = g; load(); }

// ── Escape HTML ────────────────────────────────────────
function h(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────
load();
</script>
